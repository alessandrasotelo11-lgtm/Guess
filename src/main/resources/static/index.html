<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess | Hangman Challenge</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop backdrop-one"></div>
    <div class="backdrop backdrop-two"></div>

    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Guess</p>
        <h1>Crack the word before the lights go out.</h1>
        <p class="intro">
          A fast Hangman-style challenge powered by Node.js on the backend and
          TypeScript in the browser.
        </p>
      </section>

      <section class="board">
        <div class="status-panel">
          <div>
            <p class="panel-label">Hint</p>
            <p id="hint" class="hint-text">Loading puzzle...</p>
          </div>
          <div class="stats">
            <div class="stat-card">
              <span class="panel-label">Mistakes</span>
              <strong id="mistakes">0 / 6</strong>
            </div>
            <div class="stat-card">
              <span class="panel-label">Wrong letters</span>
              <strong id="wrong-letters">None</strong>
            </div>
          </div>
        </div>

        <div class="word-panel">
          <p class="panel-label">Word</p>
          <div id="word" class="word-slots" aria-live="polite"></div>
          <p id="message" class="message">Pick a letter to begin.</p>
          <button id="restart" class="restart-button" type="button">
            New puzzle
          </button>
        </div>

        <div class="keyboard-panel">
          <p class="panel-label">Keyboard</p>
          <div id="keyboard" class="keyboard" aria-label="Guess letters"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
